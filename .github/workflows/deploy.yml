name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$VPS_SSH_KEY" > ~/.ssh/moodify_ai_deploy
          chmod 600 ~/.ssh/moodify_ai_deploy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/moodify_ai_deploy "$VPS_USER@$VPS_HOST" << 'EOF'
            set -e
            cd /opt/moodify-ai
            bash scripts/deploy.sh
          EOF
